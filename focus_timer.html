<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专注计时器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        .current-date {
            font-size: 14px;
            color: #7f8c8d;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .timer-section {
            text-align: center;
        }

        .task-input-label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
            text-align: left;
        }

        .task-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 24px;
            transition: border-color 0.3s;
        }

        .task-input:focus {
            outline: none;
            border-color: #3498db;
        }

        .timer-display {
            font-size: 56px;
            font-weight: 300;
            color: #2c3e50;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 24px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #95a5a6;
        }

        .status-indicator.active .status-dot {
            background: #27ae60;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
        }

        .btn {
            padding: 12px 32px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-start {
            background: #3498db;
            color: white;
        }

        .btn-start:hover:not(:disabled) {
            background: #2980b9;
        }

        .btn-stop {
            background: #e74c3c;
            color: white;
        }

        .btn-stop:hover:not(:disabled) {
            background: #c0392b;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .total-time {
            padding: 20px;
            background: #ecf0f1;
            border-radius: 8px;
            text-align: center;
        }

        .total-time-label {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 8px;
        }

        .total-time-value {
            font-size: 32px;
            font-weight: 600;
            color: #27ae60;
        }

        .records-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #2c3e50;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-clear {
            padding: 6px 16px;
            font-size: 13px;
            background: #95a5a6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-clear:hover {
            background: #7f8c8d;
        }

        .records-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .record-item {
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #3498db;
        }

        .record-task {
            font-size: 16px;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .record-time {
            font-size: 13px;
            color: #7f8c8d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .record-duration {
            font-weight: 600;
            color: #27ae60;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #95a5a6;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>专注计时器</h1>
            <div class="current-date" id="currentDate"></div>
        </div>

        <div class="main-content">
            <div class="card timer-section">
                <label class="task-input-label">这一轮我要做什么？</label>
                <input
                    type="text"
                    class="task-input"
                    id="taskInput"
                    placeholder="输入任务内容..."
                    autocomplete="off"
                >

                <div class="timer-display" id="timerDisplay">00:00:00</div>

                <div class="status-indicator" id="statusIndicator">
                    <span class="status-dot"></span>
                    <span id="statusText">未开始</span>
                </div>

                <div class="button-group">
                    <button class="btn btn-start" id="startBtn">开始</button>
                    <button class="btn btn-stop" id="stopBtn" disabled>结束</button>
                </div>

                <div class="total-time">
                    <div class="total-time-label">今日累计专注时长</div>
                    <div class="total-time-value" id="totalTime">0小时0分钟</div>
                </div>
            </div>

            <div class="card records-section">
                <h2>
                    今日记录
                    <button class="btn-clear" id="clearBtn">清空今日记录</button>
                </h2>
                <div class="records-list" id="recordsList"></div>
            </div>
        </div>
    </div>

    <script>
        // 状态管理
        let timerInterval = null;
        let startTime = null;
        let currentTask = '';

        // DOM 元素
        const taskInput = document.getElementById('taskInput');
        const timerDisplay = document.getElementById('timerDisplay');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const totalTime = document.getElementById('totalTime');
        const recordsList = document.getElementById('recordsList');
        const clearBtn = document.getElementById('clearBtn');
        const currentDate = document.getElementById('currentDate');

        // 获取今天的日期字符串
        function getTodayString() {
            const today = new Date();
            return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        }

        // 显示当前日期
        function displayCurrentDate() {
            const today = new Date();
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const dateStr = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日 ${days[today.getDay()]}`;
            currentDate.textContent = dateStr;
        }

        // 格式化时间显示 (HH:MM:SS)
        function formatTimeDisplay(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // 格式化时间为 HH:MM
        function formatTime(date) {
            return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        // 格式化持续时间
        function formatDuration(minutes) {
            if (minutes < 60) {
                return `${minutes}分钟`;
            }
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return m > 0 ? `${h}小时${m}分钟` : `${h}小时`;
        }

        // 从 localStorage 获取今日数据
        function getTodayData() {
            const todayStr = getTodayString();
            const allData = JSON.parse(localStorage.getItem('focusTimerData') || '{}');
            return allData[todayStr] || { records: [], currentSession: null };
        }

        // 保存今日数据到 localStorage
        function saveTodayData(data) {
            const todayStr = getTodayString();
            const allData = JSON.parse(localStorage.getItem('focusTimerData') || '{}');
            allData[todayStr] = data;
            localStorage.setItem('focusTimerData', JSON.stringify(allData));
        }

        // 计算今日累计时长（分钟）
        function calculateTotalMinutes(records) {
            return records.reduce((total, record) => total + record.duration, 0);
        }

        // 更新今日累计显示
        function updateTotalDisplay() {
            const data = getTodayData();
            const totalMinutes = calculateTotalMinutes(data.records);
            const hours = Math.floor(totalMinutes / 60);
            const minutes = totalMinutes % 60;
            totalTime.textContent = `${hours}小时${minutes}分钟`;
        }

        // 渲染记录列表
        function renderRecords() {
            const data = getTodayData();

            if (data.records.length === 0) {
                recordsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <div>今天还没有开始记录</div>
                    </div>
                `;
                return;
            }

            recordsList.innerHTML = data.records.map((record, index) => `
                <div class="record-item">
                    <div class="record-task">${index + 1}. ${record.task}</div>
                    <div class="record-time">
                        <span>${record.startTime} - ${record.endTime}</span>
                        <span class="record-duration">${formatDuration(record.duration)}</span>
                    </div>
                </div>
            `).join('');
        }

        // 更新计时器显示
        function updateTimerDisplay() {
            if (!startTime) return;

            const now = Date.now();
            const elapsed = Math.floor((now - startTime) / 1000);
            timerDisplay.textContent = formatTimeDisplay(elapsed);
        }

        // 开始计时
        function startTimer() {
            const task = taskInput.value.trim();

            if (!task) {
                alert('请先填写任务内容！');
                return;
            }

            currentTask = task;
            startTime = Date.now();

            // 保存当前会话
            const data = getTodayData();
            data.currentSession = {
                task: currentTask,
                startTime: startTime
            };
            saveTodayData(data);

            // 更新UI
            statusIndicator.classList.add('active');
            statusText.textContent = '专注中';
            startBtn.disabled = true;
            stopBtn.disabled = false;

            // 启动计时器
            timerInterval = setInterval(updateTimerDisplay, 1000);
            updateTimerDisplay();
        }

        // 结束计时
        function stopTimer() {
            if (!startTime) return;

            const endTime = Date.now();
            const durationMs = endTime - startTime;
            const durationMinutes = Math.round(durationMs / 60000);

            // 创建记录
            const record = {
                task: currentTask,
                startTime: formatTime(new Date(startTime)),
                endTime: formatTime(new Date(endTime)),
                duration: durationMinutes
            };

            // 保存记录
            const data = getTodayData();
            data.records.push(record);
            data.currentSession = null;
            saveTodayData(data);

            // 重置状态
            clearInterval(timerInterval);
            timerInterval = null;
            startTime = null;
            currentTask = '';

            // 更新UI
            statusIndicator.classList.remove('active');
            statusText.textContent = '未开始';
            startBtn.disabled = false;
            stopBtn.disabled = true;
            timerDisplay.textContent = '00:00:00';
            taskInput.value = '';

            // 刷新显示
            updateTotalDisplay();
            renderRecords();
        }

        // 恢复正在进行的会话
        function restoreSession() {
            const data = getTodayData();

            if (data.currentSession) {
                currentTask = data.currentSession.task;
                startTime = data.currentSession.startTime;
                taskInput.value = currentTask;

                // 更新UI
                statusIndicator.classList.add('active');
                statusText.textContent = '专注中';
                startBtn.disabled = true;
                stopBtn.disabled = false;

                // 启动计时器
                timerInterval = setInterval(updateTimerDisplay, 1000);
                updateTimerDisplay();
            }
        }

        // 清空今日记录
        function clearTodayRecords() {
            if (!confirm('确定要清空今日所有记录吗？此操作不可恢复。')) {
                return;
            }

            const data = getTodayData();
            data.records = [];
            saveTodayData(data);

            updateTotalDisplay();
            renderRecords();
        }

        // 事件监听
        startBtn.addEventListener('click', startTimer);
        stopBtn.addEventListener('click', stopTimer);
        clearBtn.addEventListener('click', clearTodayRecords);

        // 回车快速开始
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !startBtn.disabled) {
                startTimer();
            }
        });

        // 初始化
        displayCurrentDate();
        restoreSession();
        updateTotalDisplay();
        renderRecords();

        // 每分钟检查是否跨天
        setInterval(() => {
            const currentDateStr = getTodayString();
            const displayedDate = currentDate.textContent;

            if (!displayedDate.includes(new Date().getDate())) {
                // 跨天了，刷新页面
                location.reload();
            }
        }, 60000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专注计时器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 20px;
            line-height: 1.6;
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.9) contrast(0.9) saturate(0.9);
            z-index: -2;
        }

        body.has-background::before {
            background-image: var(--bg-image);
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        body.has-background::after {
            opacity: 1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #2c3e50;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.8);
        }

        body.has-background .header h1 {
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .current-date {
            font-size: 14px;
            color: #7f8c8d;
        }

        body.has-background .current-date {
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 30% 42% 25%;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr 1fr;
            }

            .objects-sidebar {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        body:not(.has-background) .card {
            background: white;
            backdrop-filter: none;
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .timer-section {
            text-align: center;
        }

        .task-input-label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
            text-align: left;
        }

        body.has-background .task-input-label {
            color: rgba(255, 255, 255, 0.85);
        }

        .task-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 24px;
            transition: border-color 0.3s;
            background: white;
        }

        body.has-background .task-input {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #333;
        }

        .task-input:focus {
            outline: none;
            border-color: #3498db;
        }

        .timer-display {
            font-size: 72px;
            font-weight: 700;
            color: #2c3e50;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 4px;
            transition: all 0.3s ease;
        }

        body.has-background .timer-display {
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.25);
        }

        body.state-running .timer-display {
            transform: scale(1.05);
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 24px;
            transition: color 0.3s ease;
        }

        body.has-background .status-indicator {
            color: rgba(255, 255, 255, 0.6);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #95a5a6;
            transition: all 0.3s ease;
        }

        body.state-running .status-indicator {
            color: #4db881;
        }

        body.has-background.state-running .status-indicator {
            color: rgba(77, 184, 129, 1);
        }

        body.state-running .status-dot {
            background: #4db881;
            animation: pulse 2s infinite;
        }

        body.state-finished .status-indicator {
            color: #4db881;
        }

        body.has-background.state-finished .status-indicator {
            color: rgba(77, 184, 129, 1);
        }

        body.state-finished .status-dot {
            background: #4db881;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
        }

        .btn {
            padding: 12px 32px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-start {
            background: #3498db;
            color: white;
            box-shadow: 0 2px 8px rgba(52, 152, 219, 0.3);
        }

        .btn-start:hover:not(:disabled) {
            background: #2980b9;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.4);
        }

        .btn-stop {
            background: #d97570;
            color: white;
            box-shadow: 0 2px 8px rgba(217, 117, 112, 0.3);
        }

        .btn-stop:hover:not(:disabled) {
            background: #c85f5a;
            box-shadow: 0 4px 12px rgba(217, 117, 112, 0.4);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .total-time {
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        body:not(.has-background) .total-time {
            background: #ecf0f1;
            border: none;
        }

        .total-time-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .total-time-row:last-child {
            margin-bottom: 0;
        }

        .total-time-label {
            font-size: 13px;
            color: #7f8c8d;
        }

        body.has-background .total-time-label {
            color: rgba(255, 255, 255, 0.6);
        }

        .total-time-value {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        body.has-background .total-time-value {
            color: rgba(255, 255, 255, 0.95);
        }

        .total-time-value.effective {
            color: #4db881;
        }

        body.has-background .total-time-value.effective {
            color: #4db881;
        }

        .total-time-value.ineffective {
            color: #95a5a6;
        }

        body.has-background .total-time-value.ineffective {
            color: rgba(255, 255, 255, 0.5);
        }

        .validation-panel {
            display: none;
            text-align: center;
        }

        .validation-panel.active {
            display: block;
        }

        .validation-question {
            font-size: 16px;
            margin-bottom: 20px;
            color: #2c3e50;
            font-weight: 600;
        }

        body.has-background .validation-question {
            color: rgba(255, 255, 255, 0.95);
        }

        .validation-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .validation-buttons.secondary {
            flex-direction: column;
        }

        .btn-validate {
            padding: 10px 24px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-valid {
            background: #4db881;
            color: white;
            box-shadow: 0 2px 8px rgba(77, 184, 129, 0.3);
        }

        .btn-valid:hover {
            background: #3fa56f;
            box-shadow: 0 4px 12px rgba(77, 184, 129, 0.4);
        }

        .btn-invalid {
            background: #95a5a6;
            color: white;
            box-shadow: 0 2px 8px rgba(149, 165, 166, 0.3);
        }

        .btn-invalid:hover {
            background: #7f8c8d;
            box-shadow: 0 4px 12px rgba(149, 165, 166, 0.4);
        }

        .btn-calibrate {
            background: white;
            color: #555;
            border: 2px solid #e0e0e0;
        }

        .btn-calibrate:hover {
            border-color: #3498db;
            color: #3498db;
        }

        .next-action-panel {
            padding: 20px;
            text-align: center;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .next-action-panel .btn {
            flex: 1;
            max-width: 150px;
        }

        .day-summary-panel {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-top: 20px;
        }

        .summary-content {
            font-size: 14px;
            color: #2c3e50;
            line-height: 1.8;
        }

        .summary-highlight {
            font-weight: 600;
            color: #3498db;
        }

        .records-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #2c3e50;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        body.has-background .records-section h2 {
            color: #ffffff;
        }

        .btn-clear {
            padding: 6px 16px;
            font-size: 13px;
            background: #95a5a6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-clear:hover {
            background: #7f8c8d;
        }

        .records-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .record-item {
            padding: 10px 12px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 3px solid #3498db;
            transition: all 0.2s;
        }

        body.has-background .record-item {
            background: rgba(255, 255, 255, 0.15);
            border-left-color: #3498db;
        }

        .record-item.invalid {
            opacity: 0.75;
            border-left-color: #95a5a6;
        }

        .record-item:hover {
            background: #f0f2f5;
        }

        body.has-background .record-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .record-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .record-task {
            font-size: 14px;
            font-weight: 500;
            color: #2c3e50;
            flex: 1;
            margin-right: 12px;
        }

        body.has-background .record-task {
            color: rgba(255, 255, 255, 0.85);
        }

        .record-duration-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .btn-delete-record {
            background: none;
            border: none;
            color: #95a5a6;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            transition: color 0.2s;
        }

        .btn-delete-record:hover {
            color: #e74c3c;
        }

        .record-duration-value {
            font-weight: 600;
            color: #2c3e50;
        }

        body.has-background .record-duration-value {
            color: rgba(255, 255, 255, 0.95);
        }

        .record-status {
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .record-status.valid {
            background: rgba(77, 184, 129, 0.2);
            color: #4db881;
        }

        body.has-background .record-status.valid {
            background: rgba(77, 184, 129, 0.25);
            color: #4db881;
        }

        .record-status.invalid {
            background: rgba(149, 165, 166, 0.2);
            color: #7f8c8d;
        }

        body.has-background .record-status.invalid {
            background: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.6);
        }

        .record-time {
            font-size: 12px;
            color: #95a5a6;
        }

        body.has-background .record-time {
            color: rgba(255, 255, 255, 0.6);
        }

        .record-calibration {
            font-size: 11px;
            color: #95a5a6;
            margin-left: 8px;
        }

        body.has-background .record-calibration {
            color: rgba(255, 255, 255, 0.5);
        }

        .objects-sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .objects-section {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        body:not(.has-background) .objects-section {
            background: white;
            backdrop-filter: none;
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .objects-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .objects-title {
            font-size: 14px;
            font-weight: 700;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        body.has-background .objects-title {
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .btn-add-object {
            background: none;
            border: none;
            color: #3498db;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-add-object:hover {
            color: #2980b9;
            transform: scale(1.1);
        }

        .objects-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .object-item {
            padding: 8px 10px;
            background: #f8f9fa;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        body.has-background .object-item {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .object-item:hover {
            background: #e9ecef;
        }

        body.has-background .object-item:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .object-item.selected {
            background: #e3f2fd;
            border-left-color: #3498db;
        }

        body.has-background .object-item.selected {
            background: rgba(52, 152, 219, 0.2);
        }

        .object-item.habit {
            border-left-color: #4db881;
        }

        .object-item.project {
            border-left-color: #e67e22;
        }

        .object-item.running {
            border-left-width: 4px;
            background: #fff8e6;
        }

        body.has-background .object-item.running {
            background: rgba(255, 248, 230, 0.15);
        }

        .object-item.running.habit {
            border-left-color: #4db881;
        }

        .object-item.running.project {
            border-left-color: #e67e22;
        }

        .object-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .object-name {
            font-size: 14px;
            font-weight: 500;
            color: #2c3e50;
            flex: 1;
            margin-right: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .object-name:hover {
            opacity: 0.7;
        }

        body.has-background .object-name {
            color: rgba(255, 255, 255, 0.95);
        }

        .object-name-text {
            flex: 1;
        }

        .object-name-input {
            flex: 1;
            padding: 4px 8px;
            font-size: 14px;
            font-weight: 500;
            border: 2px solid #3498db;
            border-radius: 4px;
            background: white;
            color: #333;
            outline: none;
        }

        body.has-background .object-name-input {
            background: rgba(255, 255, 255, 0.95);
            border-color: rgba(52, 152, 219, 0.8);
        }

        .btn-delete-object {
            background: none;
            border: none;
            color: #95a5a6;
            font-size: 20px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            transition: all 0.2s;
            opacity: 0;
            margin-left: 4px;
        }

        .object-item:hover .btn-delete-object {
            opacity: 1;
        }

        .btn-delete-object:hover {
            color: #d97570;
            transform: scale(1.1);
        }

        body.has-background .btn-delete-object {
            color: rgba(255, 255, 255, 0.5);
        }

        body.has-background .btn-delete-object:hover {
            color: #d97570;
        }

        .object-time {
            font-size: 12px;
            color: #7f8c8d;
            font-weight: 600;
            white-space: nowrap;
        }

        body.has-background .object-time {
            color: rgba(255, 255, 255, 0.8);
        }

        .object-today {
            font-size: 11px;
            color: #95a5a6;
            margin-bottom: 4px;
            padding-left: 2px;
        }

        body.has-background .object-today {
            color: rgba(255, 255, 255, 0.6);
        }

        .object-progress {
            width: 100%;
            height: 5px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        body.has-background .object-progress {
            background: rgba(255, 255, 255, 0.2);
        }

        .object-progress-bar {
            height: 100%;
            background: #4db881;
            transition: width 0.3s ease;
        }

        .object-actions {
            display: flex;
            gap: 4px;
        }

        .status-badge {
            font-size: 11px;
            color: #f39c12;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .current-focus {
            background: #fff3cd;
            color: #856404;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            border-left: 3px solid #f39c12;
        }

        .btn-complete-object {
            font-size: 11px;
            padding: 2px 8px;
            background: #ecf0f1;
            border: none;
            border-radius: 4px;
            color: #7f8c8d;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-complete-object:hover {
            background: #27ae60;
            color: white;
        }

        .object-empty {
            text-align: center;
            padding: 20px;
            color: #95a5a6;
            font-size: 13px;
        }

        body.has-background .object-empty {
            color: rgba(255, 255, 255, 0.5);
        }

        .completed-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #ecf0f1;
        }

        body.has-background .completed-section {
            border-top-color: rgba(255, 255, 255, 0.2);
        }

        .completed-toggle {
            font-size: 12px;
            color: #7f8c8d;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 0;
            width: 100%;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        body.has-background .completed-toggle {
            color: rgba(255, 255, 255, 0.7);
        }

        .completed-toggle:hover {
            color: #2c3e50;
        }

        body.has-background .completed-toggle:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        .completed-list {
            margin-top: 12px;
            display: none;
        }

        .completed-list.show {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .completed-item {
            padding: 8px 10px;
            background: #f8f9fa;
            border-radius: 4px;
            opacity: 0.7;
        }

        body.has-background .completed-item {
            background: rgba(255, 255, 255, 0.1);
        }

        .completed-item-name {
            font-size: 13px;
            color: #7f8c8d;
        }

        body.has-background .completed-item-name {
            color: rgba(255, 255, 255, 0.7);
        }

        .completed-item-time {
            font-size: 11px;
            color: #95a5a6;
        }

        body.has-background .completed-item-time {
            color: rgba(255, 255, 255, 0.5);
        }

        .feedback-toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .feedback-toast.show {
            opacity: 1;
        }

        .feedback-content {
            background: rgba(44, 62, 80, 0.95);
            color: white;
            padding: 20px 28px;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            font-size: 14px;
            line-height: 1.8;
            text-align: center;
            min-width: 280px;
            max-width: 400px;
        }

        .feedback-line {
            margin: 4px 0;
        }

        .feedback-highlight {
            font-weight: 600;
            color: #3498db;
        }

        .feedback-rank {
            color: #f39c12;
            font-weight: 600;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }

        .form-input {
            padding: 10px 12px;
            font-size: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #3498db;
        }

        .form-radio-group {
            display: flex;
            gap: 16px;
        }

        .form-radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #555;
        }

        .form-radio-label input[type="radio"] {
            cursor: pointer;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-modal {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-modal-primary {
            background: #3498db;
            color: white;
        }

        .btn-modal-primary:hover {
            background: #2980b9;
        }

        .btn-modal-secondary {
            background: #ecf0f1;
            color: #555;
        }

        .btn-modal-secondary:hover {
            background: #d5dbdb;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #95a5a6;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .btn-bg-control {
            padding: 6px 14px;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.2);
            color: #555;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-bg-control:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        body.has-background .btn-bg-control {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            color: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        body.has-background .btn-bg-control:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            10% { opacity: 1; transform: translateX(-50%) translateY(0); }
            90% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        #app-wrapper {
            transform-origin: top center;
            transition: transform 0.3s ease;
            width: 1200px;
            margin: 0 auto;
        }

        body {
            overflow-x: hidden;
        }
    </style>
</head>
<body>
    <div id="app-wrapper">
    <div class="container">
        <div class="header">
            <h1>专注计时器</h1>
            <div class="current-date" id="currentDate"></div>
            <div style="margin-top: 12px; display: flex; gap: 8px; justify-content: center;">
                <input type="file" id="bgUpload" accept="image/*" style="display: none;">
                <button id="btnUploadBg" class="btn-bg-control" title="上传背景">上传背景</button>
                <button id="btnRemoveBg" class="btn-bg-control" title="恢复默认" style="display: none;">恢复默认</button>
            </div>
        </div>

        <div class="main-layout">
            <div class="objects-sidebar">
                <div class="objects-section">
                    <div class="objects-header">
                        <div class="objects-title">长期事项</div>
                        <button class="btn-add-object" id="btnAddHabit" title="新增长期事项">+</button>
                    </div>
                    <div class="objects-list" id="habitsList"></div>
                </div>

                <div class="objects-section">
                    <div class="objects-header">
                        <div class="objects-title">阶段事项</div>
                        <button class="btn-add-object" id="btnAddProject" title="新增阶段事项">+</button>
                    </div>
                    <div class="objects-list" id="projectsList"></div>

                    <div class="completed-section">
                        <button class="completed-toggle" id="completedToggle">
                            <span>▶</span>
                            <span>已完成事项</span>
                        </button>
                        <div class="completed-list" id="completedList"></div>
                    </div>
                </div>
            </div>
            <div class="card timer-section">
                <div id="timerPanel">
                    <label class="task-input-label">这一轮我要做什么？</label>
                    <input
                        type="text"
                        class="task-input"
                        id="taskInput"
                        placeholder="输入任务内容..."
                        autocomplete="off"
                    >

                    <div class="current-focus" id="currentFocus" style="display: none;"></div>

                    <div class="timer-display" id="timerDisplay">00:00:00</div>

                    <div class="status-indicator" id="statusIndicator">
                        <span class="status-dot"></span>
                        <span id="statusText">未开始</span>
                    </div>

                    <div class="button-group">
                        <button class="btn btn-start" id="startBtn">开始</button>
                        <button class="btn btn-stop" id="stopBtn" disabled>结束</button>
                    </div>
                </div>

                <div id="validationPanel" class="validation-panel">
                    <div class="validation-question" id="validationQuestion">这一轮是有效专注吗？</div>

                    <div id="validationStep1" class="validation-buttons">
                        <button class="btn-validate btn-valid" id="btnValid">✓ 有效</button>
                        <button class="btn-validate btn-invalid" id="btnInvalid">✗ 无效</button>
                    </div>

                    <div id="validationStep2" class="validation-buttons secondary" style="display: none;">
                        <button class="btn-validate btn-calibrate" data-ratio="0">几乎无效</button>
                        <button class="btn-validate btn-calibrate" data-ratio="0.5">一半有效</button>
                        <button class="btn-validate btn-calibrate" data-ratio="0.8">大部分有效</button>
                    </div>
                </div>

                <div id="nextActionPanel" class="next-action-panel" style="display: none;">
                    <button class="btn btn-primary" id="btnContinue">再来一轮</button>
                    <button class="btn btn-secondary" id="btnFinishDay">今天结束</button>
                </div>

                <div id="daySummaryPanel" class="day-summary-panel" style="display: none;">
                    <div class="summary-content" id="summaryContent"></div>
                </div>

                <div class="total-time">
                    <div class="total-time-row">
                        <span class="total-time-label">今日有效专注</span>
                        <span class="total-time-value effective" id="effectiveTime">0小时0分钟</span>
                    </div>
                    <div class="total-time-row">
                        <span class="total-time-label">今日无效时间</span>
                        <span class="total-time-value ineffective" id="ineffectiveTime">0小时0分钟</span>
                    </div>
                </div>
            </div>

            <div class="card records-section">
                <h2>
                    今日记录
                    <button class="btn-clear" id="clearBtn">清空今日记录</button>
                </h2>
                <div class="records-list" id="recordsList"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="objectModal">
        <div class="modal-content">
            <div class="modal-title">新增专注对象</div>
            <form class="modal-form" id="objectForm">
                <div class="form-group">
                    <label class="form-label">名称</label>
                    <input type="text" class="form-input" id="objectName" placeholder="输入事项名称..." required>
                </div>
                <div class="form-group">
                    <label class="form-label">类型</label>
                    <div class="form-radio-group">
                        <label class="form-radio-label">
                            <input type="radio" name="objectType" value="habit" checked>
                            <span>长期事项</span>
                        </label>
                        <label class="form-radio-label">
                            <input type="radio" name="objectType" value="project">
                            <span>阶段事项</span>
                        </label>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-modal btn-modal-secondary" id="btnCancelObject">取消</button>
                    <button type="submit" class="btn-modal btn-modal-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <div class="feedback-toast" id="feedbackToast">
        <div class="feedback-content" id="feedbackContent"></div>
    </div>

    <script>
        // 状态管理
        let timerInterval = null;
        let startTime = null;
        let currentTask = '';
        let currentState = 'idle'; // idle / running / validating / finished
        let pendingRecord = null;
        let selectedObjectId = null;
        let focusObjects = [];
        let dayFinished = false;

        // DOM 元素
        const taskInput = document.getElementById('taskInput');
        const timerDisplay = document.getElementById('timerDisplay');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const effectiveTime = document.getElementById('effectiveTime');
        const ineffectiveTime = document.getElementById('ineffectiveTime');
        const recordsList = document.getElementById('recordsList');
        const clearBtn = document.getElementById('clearBtn');
        const currentDate = document.getElementById('currentDate');
        const timerPanel = document.getElementById('timerPanel');
        const validationPanel = document.getElementById('validationPanel');
        const validationStep1 = document.getElementById('validationStep1');
        const validationStep2 = document.getElementById('validationStep2');
        const btnValid = document.getElementById('btnValid');
        const btnInvalid = document.getElementById('btnInvalid');
        const habitsList = document.getElementById('habitsList');
        const projectsList = document.getElementById('projectsList');
        const completedList = document.getElementById('completedList');
        const completedToggle = document.getElementById('completedToggle');
        const btnAddHabit = document.getElementById('btnAddHabit');
        const currentFocus = document.getElementById('currentFocus');
        const btnAddProject = document.getElementById('btnAddProject');
        const objectModal = document.getElementById('objectModal');
        const objectForm = document.getElementById('objectForm');
        const objectName = document.getElementById('objectName');
        const btnCancelObject = document.getElementById('btnCancelObject');
        const feedbackToast = document.getElementById('feedbackToast');
        const feedbackContent = document.getElementById('feedbackContent');
        const nextActionPanel = document.getElementById('nextActionPanel');
        const btnContinue = document.getElementById('btnContinue');
        const btnFinishDay = document.getElementById('btnFinishDay');
        const daySummaryPanel = document.getElementById('daySummaryPanel');
        const summaryContent = document.getElementById('summaryContent');

        // 设置应用状态
        function setState(state) {
            currentState = state;

            if (state === 'validating') {
                document.body.className = '';
                timerPanel.style.display = 'none';
                validationPanel.classList.add('active');
            } else {
                document.body.className = state === 'idle' ? '' : `state-${state}`;
                timerPanel.style.display = 'block';
                validationPanel.classList.remove('active');
                validationStep1.style.display = 'flex';
                validationStep2.style.display = 'none';
            }

            if (state === 'idle') {
                statusText.textContent = '未开始';
                currentFocus.style.display = 'none';
            } else if (state === 'running') {
                statusText.textContent = '专注中';
                updateCurrentFocus();
            } else if (state === 'finished') {
                statusText.textContent = '完成一轮';
                currentFocus.style.display = 'none';
            }
        }

        function updateCurrentFocus() {
            if (selectedObjectId) {
                const obj = focusObjects.find(o => o.id === selectedObjectId);
                if (obj) {
                    currentFocus.textContent = `正在专注：${obj.name}`;
                    currentFocus.style.display = 'block';
                } else {
                    currentFocus.style.display = 'none';
                }
            } else {
                currentFocus.style.display = 'none';
            }
        }

        // 获取今天的日期字符串
        function getTodayString() {
            const today = new Date();
            return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        }

        // 专注对象管理
        function loadFocusObjects() {
            const stored = localStorage.getItem('focusObjects');
            focusObjects = stored ? JSON.parse(stored) : [];
            const today = getTodayString();
            const lastDate = localStorage.getItem('lastActiveDate');

            focusObjects = focusObjects.map(obj => {
                if (obj.effectiveMinutes === undefined) {
                    obj.effectiveMinutes = obj.totalMinutes || 0;
                }
                if (obj.ineffectiveMinutes === undefined) {
                    obj.ineffectiveMinutes = 0;
                }
                if (obj.totalMinutes === undefined) {
                    obj.totalMinutes = obj.effectiveMinutes + obj.ineffectiveMinutes;
                }
                if (obj.todayMinutes === undefined) {
                    obj.todayMinutes = 0;
                }

                if (lastDate && lastDate !== today) {
                    obj.todayMinutes = 0;
                }

                return obj;
            });

            if (!lastDate || lastDate !== today) {
                localStorage.setItem('lastActiveDate', today);
                saveFocusObjects();
            }

            return focusObjects;
        }

        function saveFocusObjects() {
            localStorage.setItem('focusObjects', JSON.stringify(focusObjects));
        }

        function createFocusObject(name, type) {
            const newObject = {
                id: Date.now(),
                name: name,
                type: type,
                status: 'active',
                totalMinutes: 0,
                effectiveMinutes: 0,
                ineffectiveMinutes: 0,
                todayMinutes: 0
            };
            focusObjects.push(newObject);
            saveFocusObjects();
            renderFocusObjects();
        }

        function completeFocusObject(id) {
            const object = focusObjects.find(obj => obj.id === id);
            if (object) {
                object.status = 'completed';
                saveFocusObjects();
                renderFocusObjects();
            }
        }

        function selectFocusObject(id) {
            if (currentState === 'running') {
                alert('计时进行中，无法切换事项');
                return;
            }
            selectedObjectId = id;
            const object = focusObjects.find(obj => obj.id === id);
            if (object) {
                taskInput.value = object.name;
            }
            renderFocusObjects();
        }

        function addTimeToObject(objectId, effectiveMins, ineffectiveMins) {
            const object = focusObjects.find(obj => obj.id === objectId);
            if (object) {
                object.effectiveMinutes = (object.effectiveMinutes || 0) + effectiveMins;
                object.ineffectiveMinutes = (object.ineffectiveMinutes || 0) + ineffectiveMins;
                object.totalMinutes = object.effectiveMinutes + object.ineffectiveMinutes;
                object.todayMinutes = (object.todayMinutes || 0) + effectiveMins + ineffectiveMins;
                saveFocusObjects();
                renderFocusObjects();
            }
        }

        function formatObjectTime(minutes) {
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            if (hours > 0) {
                return `${hours}h ${mins}m`;
            }
            return `${mins}m`;
        }

        function renderFocusObjects() {
            const habits = focusObjects.filter(obj => obj.type === 'habit' && obj.status === 'active')
                .sort((a, b) => {
                    if (a.totalMinutes === 0 && b.totalMinutes === 0) return 0;
                    if (a.totalMinutes === 0) return 1;
                    if (b.totalMinutes === 0) return -1;
                    return b.totalMinutes - a.totalMinutes;
                });
            const projects = focusObjects.filter(obj => obj.type === 'project' && obj.status === 'active')
                .sort((a, b) => {
                    if (a.totalMinutes === 0 && b.totalMinutes === 0) return 0;
                    if (a.totalMinutes === 0) return 1;
                    if (b.totalMinutes === 0) return -1;
                    return b.totalMinutes - a.totalMinutes;
                });
            const completed = focusObjects.filter(obj => obj.status === 'completed');

            habitsList.innerHTML = habits.length > 0 ? habits.map(obj => {
                const isRunning = currentState === 'running' && selectedObjectId === obj.id;
                const effectivePercent = obj.totalMinutes > 0 ? (obj.effectiveMinutes / obj.totalMinutes) * 100 : 0;
                const todayTime = obj.todayMinutes > 0 ? `今日：${formatObjectTime(obj.todayMinutes)}` : '';
                return `
                <div class="object-item habit ${obj.id === selectedObjectId ? 'selected' : ''} ${isRunning ? 'running' : ''}" data-id="${obj.id}">
                    <div class="object-main">
                        <div class="object-name" data-edit-id="${obj.id}">
                            <span class="object-name-text">${obj.name}</span>
                            ${isRunning ? '<span class="status-badge">● 进行中</span>' : ''}
                        </div>
                        <div class="object-time">${formatObjectTime(obj.totalMinutes)}</div>
                        <button class="btn-delete-object" data-delete-id="${obj.id}" title="删除">×</button>
                    </div>
                    ${todayTime ? `<div class="object-today">${todayTime}</div>` : ''}
                    <div class="object-progress">
                        <div class="object-progress-bar" style="width: ${effectivePercent}%"></div>
                    </div>
                    <div class="object-actions">
                        <button class="btn-complete-object" data-complete-id="${obj.id}">完成</button>
                    </div>
                </div>
            `;}).join('') : '<div class="object-empty">暂无长期事项</div>';

            projectsList.innerHTML = projects.length > 0 ? projects.map(obj => {
                const isRunning = currentState === 'running' && selectedObjectId === obj.id;
                const effectivePercent = obj.totalMinutes > 0 ? (obj.effectiveMinutes / obj.totalMinutes) * 100 : 0;
                const todayTime = obj.todayMinutes > 0 ? `今日：${formatObjectTime(obj.todayMinutes)}` : '';
                return `
                <div class="object-item project ${obj.id === selectedObjectId ? 'selected' : ''} ${isRunning ? 'running' : ''}" data-id="${obj.id}">
                    <div class="object-main">
                        <div class="object-name" data-edit-id="${obj.id}">
                            <span class="object-name-text">${obj.name}</span>
                            ${isRunning ? '<span class="status-badge">● 进行中</span>' : ''}
                        </div>
                        <div class="object-time">${formatObjectTime(obj.totalMinutes)}</div>
                        <button class="btn-delete-object" data-delete-id="${obj.id}" title="删除">×</button>
                    </div>
                    ${todayTime ? `<div class="object-today">${todayTime}</div>` : ''}
                    <div class="object-progress">
                        <div class="object-progress-bar" style="width: ${effectivePercent}%"></div>
                    </div>
                    <div class="object-actions">
                        <button class="btn-complete-object" data-complete-id="${obj.id}">完成</button>
                    </div>
                </div>
            `;}).join('') : '<div class="object-empty">暂无阶段事项</div>';

            completedList.innerHTML = completed.length > 0 ? completed.map(obj => `
                <div class="completed-item">
                    <div class="completed-item-name">${obj.name}</div>
                    <div class="completed-item-time">${formatObjectTime(obj.totalMinutes)}</div>
                </div>
            `).join('') : '';

            attachObjectListeners();
        }

        function attachObjectListeners() {
            document.querySelectorAll('.object-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('btn-complete-object') &&
                        !e.target.classList.contains('btn-delete-object') &&
                        !e.target.hasAttribute('data-edit-id') &&
                        !e.target.classList.contains('object-name-text') &&
                        !e.target.classList.contains('object-name-input')) {
                        const id = parseInt(item.getAttribute('data-id'));
                        selectFocusObject(id);
                    }
                });
            });

            document.querySelectorAll('[data-complete-id]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.getAttribute('data-complete-id'));
                    completeFocusObject(id);
                });
            });

            document.querySelectorAll('[data-delete-id]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.getAttribute('data-delete-id'));
                    confirmDeleteObject(id);
                });
            });

            document.querySelectorAll('[data-edit-id]').forEach(nameEl => {
                nameEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(nameEl.getAttribute('data-edit-id'));
                    startEditObjectName(nameEl, id);
                });
            });
        }

        function startEditObjectName(nameEl, id) {
            const obj = focusObjects.find(o => o.id === id);
            if (!obj) return;

            const textSpan = nameEl.querySelector('.object-name-text');
            if (!textSpan) return;

            const currentName = obj.name;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentName;
            input.className = 'object-name-input';

            textSpan.style.display = 'none';
            nameEl.insertBefore(input, textSpan);
            input.focus();
            input.select();

            function saveEdit() {
                const newName = input.value.trim();
                if (newName && newName !== currentName) {
                    obj.name = newName;
                    saveFocusObjects();
                }
                renderFocusObjects();
            }

            input.addEventListener('blur', saveEdit);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    input.blur();
                }
                if (e.key === 'Escape') {
                    renderFocusObjects();
                }
            });
        }

        function confirmDeleteObject(id) {
            const obj = focusObjects.find(o => o.id === id);
            if (!obj) return;

            const confirmMsg = `确定删除"${obj.name}"吗？`;
            showDeleteConfirm(confirmMsg, () => {
                deleteObject(id);
            });
        }

        function deleteObject(id) {
            focusObjects = focusObjects.filter(o => o.id !== id);
            if (selectedObjectId === id) {
                selectedObjectId = null;
            }
            saveFocusObjects();
            renderFocusObjects();
        }

        function showDeleteConfirm(message, onConfirm) {
            const modal = document.createElement('div');
            modal.className = 'modal active';
            modal.innerHTML = `
                <div class="modal-content" style="max-width: 320px;">
                    <div class="modal-title">确认删除</div>
                    <div style="margin-bottom: 24px; color: #555; font-size: 14px; line-height: 1.6;">${message}</div>
                    <div class="modal-buttons">
                        <button class="btn-modal btn-modal-secondary" id="btnCancelDelete">取消</button>
                        <button class="btn-modal btn-modal-primary" id="btnConfirmDelete">确定</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            const btnCancel = modal.querySelector('#btnCancelDelete');
            const btnConfirm = modal.querySelector('#btnConfirmDelete');

            btnCancel.addEventListener('click', () => {
                document.body.removeChild(modal);
            });

            btnConfirm.addEventListener('click', () => {
                onConfirm();
                document.body.removeChild(modal);
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    document.body.removeChild(modal);
                }
            });
        }

        // 显示当前日期
        function displayCurrentDate() {
            const today = new Date();
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const dateStr = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日 ${days[today.getDay()]}`;
            currentDate.textContent = dateStr;
        }

        // 格式化时间显示 (HH:MM:SS)
        function formatTimeDisplay(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // 格式化时间为 HH:MM
        function formatTime(date) {
            return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        // 格式化持续时间
        function formatDuration(minutes) {
            if (minutes < 60) {
                return `${minutes}分钟`;
            }
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return m > 0 ? `${h}小时${m}分钟` : `${h}小时`;
        }

        // 从 localStorage 获取今日数据
        function getTodayData() {
            const todayStr = getTodayString();
            const allData = JSON.parse(localStorage.getItem('focusTimerData') || '{}');
            return allData[todayStr] || { records: [], currentSession: null };
        }

        // 保存今日数据到 localStorage
        function saveTodayData(data) {
            const todayStr = getTodayString();
            const allData = JSON.parse(localStorage.getItem('focusTimerData') || '{}');
            allData[todayStr] = data;
            localStorage.setItem('focusTimerData', JSON.stringify(allData));
        }

        // 计算今日有效和无效时长
        function calculateTimes(records) {
            let effective = 0;
            let ineffective = 0;

            records.forEach(record => {
                if (record.effectiveMinutes !== undefined && record.ineffectiveMinutes !== undefined) {
                    effective += record.effectiveMinutes;
                    ineffective += record.ineffectiveMinutes;
                } else {
                    effective += record.duration || 0;
                }
            });

            return { effective, ineffective };
        }

        // 格式化时间（小时分钟）
        function formatHoursMinutes(totalMinutes) {
            const hours = Math.floor(totalMinutes / 60);
            const minutes = totalMinutes % 60;
            return `${hours}小时${minutes}分钟`;
        }

        // 更新今日累计显示
        function updateTotalDisplay() {
            const data = getTodayData();
            const times = calculateTimes(data.records);

            effectiveTime.textContent = formatHoursMinutes(times.effective);
            ineffectiveTime.textContent = formatHoursMinutes(times.ineffective);
        }

        // 渲染记录列表
        function renderRecords() {
            const data = getTodayData();

            if (data.records.length === 0) {
                recordsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <div>今天还没有开始记录</div>
                    </div>
                `;
                return;
            }

            recordsList.innerHTML = data.records.map((record, index) => {
                const isValid = record.status === 'valid' || record.status === undefined;
                const statusClass = isValid ? 'valid' : 'invalid';
                const statusText = isValid ? '✓ 有效' : '✗ 无效';
                const itemClass = isValid ? '' : 'invalid';

                let calibrationText = '';
                if (!isValid && record.effectiveMinutes !== undefined) {
                    calibrationText = `<span class="record-calibration">有效 ${record.effectiveMinutes}分钟 / 无效 ${record.ineffectiveMinutes}分钟</span>`;
                }

                const totalMinutes = record.duration || 0;

                return `
                    <div class="record-item ${itemClass}">
                        <div class="record-main">
                            <div class="record-task">${index + 1}. ${record.task}</div>
                            <div class="record-duration-badge">
                                <span class="record-duration-value">${totalMinutes}分钟</span>
                                <span class="record-status ${statusClass}">${statusText}</span>
                                <button class="btn-delete-record" data-record-index="${index}" title="删除">×</button>
                            </div>
                        </div>
                        <div class="record-time">
                            ${record.startTime} - ${record.endTime}
                            ${calibrationText}
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.btn-delete-record').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const recordIndex = parseInt(e.target.getAttribute('data-record-index'));
                    deleteRecord(recordIndex);
                });
            });
        }

        function deleteRecord(index) {
            const data = getTodayData();
            const record = data.records[index];

            if (!record) return;

            if (record.objectId) {
                const obj = focusObjects.find(o => o.id === record.objectId);
                if (obj) {
                    obj.effectiveMinutes = Math.max(0, (obj.effectiveMinutes || 0) - (record.effectiveMinutes || 0));
                    obj.ineffectiveMinutes = Math.max(0, (obj.ineffectiveMinutes || 0) - (record.ineffectiveMinutes || 0));
                    obj.totalMinutes = obj.effectiveMinutes + obj.ineffectiveMinutes;
                    obj.todayMinutes = Math.max(0, (obj.todayMinutes || 0) - (record.duration || 0));
                    saveFocusObjects();
                    renderFocusObjects();
                }
            }

            data.records.splice(index, 1);
            saveTodayData(data);

            updateTotalDisplay();
            renderRecords();
        }

        // 更新计时器显示
        function updateTimerDisplay() {
            if (!startTime) return;

            const now = Date.now();
            const elapsed = Math.floor((now - startTime) / 1000);
            timerDisplay.textContent = formatTimeDisplay(elapsed);
        }

        // 开始计时
        function startTimer() {
            const task = taskInput.value.trim();

            if (!task) {
                alert('请先填写任务内容！');
                return;
            }

            currentTask = task;
            startTime = Date.now();

            // 保存当前会话
            const data = getTodayData();
            data.currentSession = {
                task: currentTask,
                startTime: startTime,
                objectId: selectedObjectId
            };
            saveTodayData(data);

            // 更新状态
            setState('running');
            startBtn.disabled = true;
            stopBtn.disabled = false;

            // 启动计时器
            timerInterval = setInterval(updateTimerDisplay, 1000);
            updateTimerDisplay();
        }

        // 结束计时
        function stopTimer() {
            if (!startTime) return;

            const endTime = Date.now();
            const durationMs = endTime - startTime;
            let durationMinutes = Math.round(durationMs / 60000);

            if (durationMinutes < 1) {
                durationMinutes = 1;
            }

            // 保存待处理记录
            const sessionData = getTodayData().currentSession;
            pendingRecord = {
                id: Date.now(),
                task: currentTask,
                startTime: formatTime(new Date(startTime)),
                endTime: formatTime(new Date(endTime)),
                duration: durationMinutes,
                objectId: sessionData ? sessionData.objectId : null
            };

            // 重置计时状态
            clearInterval(timerInterval);
            timerInterval = null;

            // 清除当前会话
            const data = getTodayData();
            data.currentSession = null;
            saveTodayData(data);

            // 进入校准状态
            setState('validating');
            startBtn.disabled = true;
            stopBtn.disabled = true;
        }

        // 重置到空闲状态
        function resetToIdle() {
            clearInterval(timerInterval);
            timerInterval = null;
            startTime = null;
            currentTask = '';
            pendingRecord = null;

            setState('idle');
            startBtn.disabled = false;
            stopBtn.disabled = true;
            timerDisplay.textContent = '00:00:00';
            taskInput.value = '';

            const data = getTodayData();
            data.currentSession = null;
            saveTodayData(data);
        }

        // 保存记录
        function saveRecord(record) {
            const data = getTodayData();
            data.records.push(record);
            saveTodayData(data);

            updateTotalDisplay();
            renderRecords();
        }

        // 完成校准并保存
        function finishValidation() {
            const lastSelectedObjectId = selectedObjectId;
            startTime = null;
            currentTask = '';
            pendingRecord = null;

            setState('finished');

            setTimeout(() => {
                if (currentState === 'finished' && !dayFinished) {
                    validationPanel.classList.remove('active');
                    nextActionPanel.style.display = 'flex';
                    btnContinue.setAttribute('data-last-object-id', lastSelectedObjectId || '');
                }
            }, 2800);
        }

        function continueNextRound() {
            const lastObjectId = btnContinue.getAttribute('data-last-object-id');
            if (lastObjectId) {
                selectedObjectId = parseInt(lastObjectId);
                const obj = focusObjects.find(o => o.id === selectedObjectId);
                if (obj) {
                    taskInput.value = obj.name;
                }
            }
            nextActionPanel.style.display = 'none';
            setState('idle');
            startBtn.disabled = false;
            stopBtn.disabled = true;
            timerDisplay.textContent = '00:00:00';
            renderFocusObjects();
        }

        function finishDay() {
            dayFinished = true;
            nextActionPanel.style.display = 'none';

            const data = getTodayData();
            const records = data.records || [];

            const todayObjects = focusObjects.filter(obj => obj.todayMinutes > 0)
                .sort((a, b) => b.todayMinutes - a.todayMinutes);

            let summaryHTML = '';

            if (todayObjects.length > 0) {
                const topObject = todayObjects[0];
                const hours = Math.floor(topObject.todayMinutes / 60);
                const mins = topObject.todayMinutes % 60;
                const timeStr = hours > 0 ? `${hours} 小时 ${mins} 分钟` : `${mins} 分钟`;

                summaryHTML += `<div style="margin-bottom: 16px;">今天你把最多时间给了 <span class="summary-highlight">「${topObject.name}」</span></div>`;
                summaryHTML += `<div style="margin-bottom: 20px;">共 <span class="summary-highlight">${timeStr}</span></div>`;
            }

            let totalEffective = 0;
            let totalIneffective = 0;
            records.forEach(record => {
                totalEffective += record.effectiveMinutes || 0;
                totalIneffective += record.ineffectiveMinutes || 0;
            });

            const effHours = Math.floor(totalEffective / 60);
            const effMins = totalEffective % 60;
            const ineffHours = Math.floor(totalIneffective / 60);
            const ineffMins = totalIneffective % 60;

            summaryHTML += `<div style="font-size: 13px; color: #7f8c8d;">有效专注：${effHours > 0 ? `${effHours} 小时 ` : ''}${effMins} 分钟</div>`;
            summaryHTML += `<div style="font-size: 13px; color: #7f8c8d;">无效时间：${ineffHours > 0 ? `${ineffHours} 小时 ` : ''}${ineffMins} 分钟</div>`;

            summaryContent.innerHTML = summaryHTML;
            daySummaryPanel.style.display = 'block';

            setState('idle');
            startBtn.disabled = true;
            stopBtn.disabled = true;
            timerDisplay.textContent = '00:00:00';
            taskInput.value = '';
            selectedObjectId = null;
            renderFocusObjects();
        }

        // 处理有效确认
        function handleValid() {
            if (!pendingRecord) return;

            const record = {
                ...pendingRecord,
                status: 'valid',
                effectiveMinutes: pendingRecord.duration,
                ineffectiveMinutes: 0
            };

            saveRecord(record);

            if (pendingRecord.objectId) {
                addTimeToObject(pendingRecord.objectId, pendingRecord.duration, 0);
            }

            showSessionFeedback(pendingRecord.duration, pendingRecord.objectId);

            finishValidation();
        }

        // 处理无效确认
        function handleInvalid() {
            validationStep1.style.display = 'none';
            validationStep2.style.display = 'flex';
        }

        // 处理校准选择
        function handleCalibrate(ratio) {
            if (!pendingRecord) return;

            const totalMinutes = pendingRecord.duration;
            let effectiveMinutes, ineffectiveMinutes;

            if (totalMinutes === 1) {
                if (ratio === 0) {
                    effectiveMinutes = 0;
                    ineffectiveMinutes = 1;
                } else {
                    effectiveMinutes = 1;
                    ineffectiveMinutes = 0;
                }
            } else {
                effectiveMinutes = Math.round(totalMinutes * ratio);
                ineffectiveMinutes = totalMinutes - effectiveMinutes;
            }

            let calibrationType = '';
            if (ratio === 0) calibrationType = 'almost_none';
            else if (ratio === 0.5) calibrationType = 'half';
            else if (ratio === 0.8) calibrationType = 'mostly';

            const record = {
                ...pendingRecord,
                status: 'invalid',
                calibrationType: calibrationType,
                effectiveMinutes: effectiveMinutes,
                ineffectiveMinutes: ineffectiveMinutes
            };

            saveRecord(record);

            if (pendingRecord.objectId) {
                addTimeToObject(pendingRecord.objectId, effectiveMinutes, ineffectiveMinutes);
            }

            showSessionFeedback(effectiveMinutes, pendingRecord.objectId);

            finishValidation();
        }

        // 恢复正在进行的会话
        function restoreSession() {
            const data = getTodayData();

            if (data.currentSession) {
                currentTask = data.currentSession.task;
                startTime = data.currentSession.startTime;
                selectedObjectId = data.currentSession.objectId || null;
                taskInput.value = currentTask;

                // 更新状态
                setState('running');
                startBtn.disabled = true;
                stopBtn.disabled = false;

                // 启动计时器
                timerInterval = setInterval(updateTimerDisplay, 1000);
                updateTimerDisplay();
            }
        }

        // 清空今日记录
        function clearTodayRecords() {
            if (!confirm('确定要清空今日所有记录吗？此操作不可恢复。')) {
                return;
            }

            const data = getTodayData();
            data.records = [];
            saveTodayData(data);

            updateTotalDisplay();
            renderRecords();
        }

        // Modal 管理
        function openModal(defaultType = 'habit') {
            objectModal.classList.add('active');
            objectName.value = '';
            document.querySelector(`input[name="objectType"][value="${defaultType}"]`).checked = true;
            objectName.focus();
        }

        function closeModal() {
            objectModal.classList.remove('active');
        }

        // 结束反馈
        function showSessionFeedback(effectiveMinutes, objectId) {
            if (effectiveMinutes === 0) {
                return;
            }

            let html = '';

            if (objectId) {
                const obj = focusObjects.find(o => o.id === objectId);
                if (obj) {
                    const totalEffective = obj.effectiveMinutes;
                    const hours = Math.floor(totalEffective / 60);
                    const mins = totalEffective % 60;
                    const timeStr = hours > 0 ? `${hours} 小时 ${mins} 分钟` : `${mins} 分钟`;

                    const activeObjects = focusObjects.filter(o => o.status === 'active').sort((a, b) => b.totalMinutes - a.totalMinutes);
                    const rank = activeObjects.findIndex(o => o.id === objectId) + 1;

                    html = `
                        <div class="feedback-line">你刚刚把 <span class="feedback-highlight">${effectiveMinutes}</span> 分钟给了<span class="feedback-highlight">「${obj.name}」</span></div>
                        <div class="feedback-line">它今天已经占用了你 <span class="feedback-highlight">${timeStr}</span></div>
                        <div class="feedback-line">${rank === 1 ? '它是你今天投入最多的事情' : `当前排名：第 <span class="feedback-rank">${rank}</span> 位`}</div>
                    `;
                }
            } else {
                html = `
                    <div class="feedback-line">你刚刚完成了 <span class="feedback-highlight">${effectiveMinutes}</span> 分钟专注</div>
                    <div class="feedback-line">（未归属于任何事项）</div>
                `;
            }

            feedbackContent.innerHTML = html;
            feedbackToast.classList.add('show');

            setTimeout(() => {
                feedbackToast.classList.remove('show');
            }, 2500);
        }

        // 事件监听
        startBtn.addEventListener('click', startTimer);
        stopBtn.addEventListener('click', stopTimer);
        clearBtn.addEventListener('click', clearTodayRecords);
        btnValid.addEventListener('click', handleValid);
        btnInvalid.addEventListener('click', handleInvalid);

        btnAddHabit.addEventListener('click', () => openModal('habit'));
        btnAddProject.addEventListener('click', () => openModal('project'));
        btnCancelObject.addEventListener('click', closeModal);

        objectModal.addEventListener('click', (e) => {
            if (e.target === objectModal) {
                closeModal();
            }
        });

        objectForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = objectName.value.trim();
            const type = document.querySelector('input[name="objectType"]:checked').value;

            if (name) {
                createFocusObject(name, type);
                closeModal();
            }
        });

        completedToggle.addEventListener('click', () => {
            const arrow = completedToggle.querySelector('span:first-child');
            completedList.classList.toggle('show');
            arrow.textContent = completedList.classList.contains('show') ? '▼' : '▶';
        });

        taskInput.addEventListener('input', () => {
            if (selectedObjectId && taskInput.value !== focusObjects.find(o => o.id === selectedObjectId)?.name) {
                selectedObjectId = null;
                renderFocusObjects();
            }
        });

        // 校准按钮
        document.querySelectorAll('[data-ratio]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const ratio = parseFloat(e.target.getAttribute('data-ratio'));
                handleCalibrate(ratio);
            });
        });

        btnContinue.addEventListener('click', continueNextRound);
        btnFinishDay.addEventListener('click', finishDay);

        // 回车快速开始
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !startBtn.disabled) {
                startTimer();
            }
        });

        // 清空选中状态（手动输入时）
        taskInput.addEventListener('input', () => {
            const selectedObject = focusObjects.find(obj => obj.id === selectedObjectId);
            if (selectedObject && taskInput.value !== selectedObject.name) {
                selectedObjectId = null;
                renderFocusObjects();
            }
        });

        // 背景图片管理
        const bgUpload = document.getElementById('bgUpload');
        const btnUploadBg = document.getElementById('btnUploadBg');
        const btnRemoveBg = document.getElementById('btnRemoveBg');

        function showToast(message) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.8);
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 14px;
                z-index: 10000;
                backdrop-filter: blur(8px);
                animation: fadeInOut 3s ease-in-out;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/webp'];
                if (!allowedTypes.includes(file.type)) {
                    reject('暂不支持该图片格式，请上传 JPG / PNG / WebP 图片');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');

                        const maxDimension = 1600;
                        let width = img.width;
                        let height = img.height;

                        if (width > maxDimension || height > maxDimension) {
                            if (width > height) {
                                height = (height / width) * maxDimension;
                                width = maxDimension;
                            } else {
                                width = (width / height) * maxDimension;
                                height = maxDimension;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);

                        const quality = 0.8;
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);

                        const originalSize = (file.size / 1024 / 1024).toFixed(2);
                        const compressedSize = (compressedDataUrl.length * 0.75 / 1024 / 1024).toFixed(2);

                        resolve({
                            dataUrl: compressedDataUrl,
                            originalSize,
                            compressedSize,
                            wasCompressed: img.width > maxDimension || img.height > maxDimension
                        });
                    };
                    img.onerror = () => reject('图片加载失败，请换一张图片');
                    img.src = e.target.result;
                };
                reader.onerror = () => reject('图片读取失败');
                reader.readAsDataURL(file);
            });
        }

        function loadBackground() {
            try {
                const savedBg = localStorage.getItem('customBackground');
                if (savedBg) {
                    document.body.style.setProperty('--bg-image', `url(${savedBg})`);
                    document.body.classList.add('has-background');
                    btnRemoveBg.style.display = 'inline-block';
                }
            } catch (error) {
                console.error('背景加载失败:', error);
                localStorage.removeItem('customBackground');
            }
        }

        function saveBackground(dataUrl) {
            try {
                localStorage.setItem('customBackground', dataUrl);
                document.body.style.setProperty('--bg-image', `url(${dataUrl})`);
                document.body.classList.add('has-background');
                btnRemoveBg.style.display = 'inline-block';
            } catch (error) {
                if (error.name === 'QuotaExceededError') {
                    showToast('背景保存失败，请换一张更小的图片');
                } else {
                    showToast('背景保存失败，请重试');
                }
                throw error;
            }
        }

        function removeBackground() {
            try {
                localStorage.removeItem('customBackground');
                document.body.style.removeProperty('--bg-image');
                document.body.classList.remove('has-background');
                btnRemoveBg.style.display = 'none';
            } catch (error) {
                console.error('移除背景失败:', error);
            }
        }

        btnUploadBg.addEventListener('click', () => {
            bgUpload.click();
        });

        bgUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                const result = await compressImage(file);

                if (result.wasCompressed) {
                    showToast('图片已自动压缩后使用');
                }

                saveBackground(result.dataUrl);
            } catch (error) {
                showToast(error);
            }

            bgUpload.value = '';
        });

        btnRemoveBg.addEventListener('click', removeBackground);

        // 初始化
        displayCurrentDate();
        loadFocusObjects();
        renderFocusObjects();
        restoreSession();
        updateTotalDisplay();
        renderRecords();
        loadBackground();

        // 每分钟检查是否跨天
        setInterval(() => {
            const currentDateStr = getTodayString();
            const displayedDate = currentDate.textContent;

            if (!displayedDate.includes(new Date().getDate())) {
                // 跨天了，刷新页面
                location.reload();
            }
        }, 60000);

        // 整体缩放适配
        function updateScale() {
            const wrapper = document.getElementById('app-wrapper');
            const baseWidth = 1200;
            const windowWidth = window.innerWidth;

            let scale = windowWidth / baseWidth;
            scale = Math.max(0.75, Math.min(1, scale));

            wrapper.style.transform = `scale(${scale})`;
        }

        updateScale();
        window.addEventListener('resize', updateScale);
    </script>
    </div>
</body>
